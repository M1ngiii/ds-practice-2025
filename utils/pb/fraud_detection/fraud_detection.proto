syntax = "proto3";

package fraud_detection;

service FraudDetectionService {
    rpc InitOrder (FraudRequest) returns (FraudResponse);
    rpc RunEventD (OrderEventRequest) returns (OrderEventResponse);
    rpc RunEventE (OrderEventRequest) returns (OrderEventResponse);
    rpc ClearOrder (ClearOrderRequest) returns (ClearOrderResponse);
}

message FraudRequest {
    string order_id = 1;
    repeated int32 vector_clock = 2;

    string card_number = 3;
    float order_amount = 4;
    repeated string item_names = 5;
}

message FraudResponse {
    bool is_fraud = 1;
    repeated int32 vector_clock = 2;
}

message OrderEventRequest {
    string order_id = 1;
    repeated int32 vector_clock = 2;
}

message OrderEventResponse {
    bool success = 1;
}

message ClearOrderRequest {
    string order_id = 1;
    repeated int32 vector_clock = 2;
}

message ClearOrderResponse {
    bool success = 1;
    string error = 2;
}

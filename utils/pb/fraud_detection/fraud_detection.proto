syntax = "proto3";

package fraud_detection;

import "common/common.proto";

service FraudDetectionService {
    rpc InitOrder (FraudRequest) returns (FraudResponse);
    rpc checkFraud (FraudRequest) returns (FraudResponse);
}

message FraudRequest {
    string order_id = 1;
    repeated int32 vector_clock = 2;

    string card_number = 3;
    float order_amount = 4;
    repeated string item_names = 5;
}

message FraudResponse {
    bool is_fraud = 1;
    repeated int32 vector_clock = 2;
    repeated common.Book suggested_books = 3;
}

syntax = "proto3";

package transaction_verification;

import "common/common.proto";

service TransactionVerificationService {
    rpc InitOrder (TransactionRequest) returns (TransactionResponse);
    rpc VerifyItems (OrderEventRequest) returns (OrderEventResponse);
    rpc CheckUserData (OrderEventRequest) returns (OrderEventResponse);
    rpc CheckCard (OrderEventRequest) returns (OrderEventResponse);
    rpc ClearOrder (ClearOrderRequest) returns (ClearOrderResponse);
}

message Item {
    string name = 1;
    int32 quantity = 2;
}

message CreditCard {
    string number = 1;
    string expiration_date = 2;
    string cvv = 3;
}

message TransactionRequest {
    string order_id = 1;
    repeated int32 vector_clock = 2;

    string user_name = 3;
    string user_contact = 4;
    repeated Item items = 5;
    CreditCard credit_card = 6;
    bool terms_accepted = 7;
}

message TransactionResponse {
    bool is_valid = 1;
    string reason = 2;
    repeated int32 vector_clock = 3;
    repeated common.Book suggested_books = 4;
}

message OrderEventRequest {
    string order_id = 1;
    repeated int32 vector_clock = 2;
}

message OrderEventResponse {
    bool success = 1;
    string reason = 2;
    repeated int32 vector_clock = 3;
}

message ClearOrderRequest {
    string order_id = 1;
    repeated int32 vector_clock = 2;
}

message ClearOrderResponse {
    bool success = 1;
    string error = 2;
}
